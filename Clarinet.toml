[project]
name = "mini-event-pattern"
authors = ["Mini Event Pattern Team"]
description = "A flexible event access management system using Clarity smart contracts"
telemetry = false
requirements = []
[contracts.event-access-manager]
path = "contracts/event-access-manager.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
